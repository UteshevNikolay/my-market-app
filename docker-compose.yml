services:
  postgres:
    image: postgres:16
    container_name: postgres-db-my-market
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-my-market
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak-my-market
    command: start-dev --import-realm
    restart: always
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      PAYMENT_INITIAL_BALANCE: 100000
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/market-realm
    depends_on:
      keycloak:
        condition: service_healthy

  market-app:
    build:
      context: .
      dockerfile: market-app/Dockerfile
    container_name: my-market-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/testdb
      R2DB_URL: r2dbc:postgresql://postgres:5432/testdb
      DB_USERNAME: user
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PAYMENT_SERVICE_URL: http://payment-service:8081
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/market-realm/protocol/openid-connect/token
      KEYCLOAK_CLIENT_SECRET: market-app-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

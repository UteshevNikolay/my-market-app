databaseChangeLog:

  - changeSet:
      id: 1-create-item-table
      author: dev
      changes:
        - createTable:
            tableName: item
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: price
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: img_path
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

  - changeSet:
      id: 2-create-cart-item-table
      author: dev
      changes:
        - createTable:
            tableName: cart_item
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: item_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_item
                    references: item(id)
              - column:
                  name: count
                  type: INTEGER
                  constraints:
                    nullable: false

  - changeSet:
      id: 3-create-customer-order-table
      author: dev
      changes:
        - createTable:
            tableName: customer_order
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

  - changeSet:
      id: 4-create-order-item-table
      author: dev
      changes:
        - createTable:
            tableName: order_item
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_item_order
                    references: customer_order(id)
              - column:
                  name: item_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_item_item
                    references: item(id)
              - column:
                  name: count
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: INTEGER
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-seed-items
      author: dev
